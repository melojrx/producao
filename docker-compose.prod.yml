services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    environment:
      DJANGO_SETTINGS_MODULE: pcp_project.config.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?defina DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: ${POSTGRES_DB:-pcp_db}
      POSTGRES_USER: ${POSTGRES_USER:-pcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      MEDIA_ROOT: /app/media
      MEDIA_URL: ${MEDIA_URL:-/media/}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-}
      USE_S3_STORAGE: ${USE_S3_STORAGE:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-false}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health/'); body=json.loads(r.read().decode()); exit(0 if r.status==200 and body.get('status')=='ok' and body.get('database')=='ok' else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pcp_db}
      POSTGRES_USER: ${POSTGRES_USER:-pcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcp_user} -d ${POSTGRES_DB:-pcp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:

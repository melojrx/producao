services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8001:8000"
    environment:
      DJANGO_SETTINGS_MODULE: pcp_project.config.local
      POSTGRES_DB: pcp_db
      POSTGRES_USER: pcp_user
      POSTGRES_PASSWORD: pcp_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pcp_db
      POSTGRES_USER: pcp_user
      POSTGRES_PASSWORD: pcp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcp_user -d pcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:

name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy VPS
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://producao.costurai.com.br
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VPS_DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${VPS_DEPLOY_PATH:-/opt/producao}"
            export DEPLOY_REF=main
            cd "${DEPLOY_PATH}"
            bash scripts/deploy/vps-production.sh

# Frontend Next.js producao — imagem standalone (MDJ-18)

services:
  frontend:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        NEXT_PUBLIC_DJANGO_API_URL: ${NEXT_PUBLIC_DJANGO_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_USE_DJANGO_SCANNER_READS: ${NEXT_PUBLIC_USE_DJANGO_SCANNER_READS:-false}
        NEXT_PUBLIC_USE_DJANGO_CADASTROS_READS: ${NEXT_PUBLIC_USE_DJANGO_CADASTROS_READS:-false}
        NEXT_PUBLIC_USE_DJANGO_METAS_READS: ${NEXT_PUBLIC_USE_DJANGO_METAS_READS:-false}
        NEXT_PUBLIC_USE_DJANGO_DASHBOARD_READS: ${NEXT_PUBLIC_USE_DJANGO_DASHBOARD_READS:-false}
        NEXT_PUBLIC_USE_DJANGO_AUTH: ${NEXT_PUBLIC_USE_DJANGO_AUTH:-false}
        NEXT_PUBLIC_USE_DJANGO_ADMIN_WRITES: ${NEXT_PUBLIC_USE_DJANGO_ADMIN_WRITES:-false}
        NEXT_PUBLIC_USE_DJANGO_PRODUCAO_WRITES: ${NEXT_PUBLIC_USE_DJANGO_PRODUCAO_WRITES:-false}
        NEXT_PUBLIC_USE_DJANGO_QUALIDADE_WRITES: ${NEXT_PUBLIC_USE_DJANGO_QUALIDADE_WRITES:-false}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DJANGO_API_URL: http://backend:8000
      NEXT_PUBLIC_DJANGO_API_URL: ${NEXT_PUBLIC_DJANGO_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_USE_DJANGO_SCANNER_READS: ${NEXT_PUBLIC_USE_DJANGO_SCANNER_READS:-false}
      NEXT_PUBLIC_USE_DJANGO_CADASTROS_READS: ${NEXT_PUBLIC_USE_DJANGO_CADASTROS_READS:-false}
      NEXT_PUBLIC_USE_DJANGO_METAS_READS: ${NEXT_PUBLIC_USE_DJANGO_METAS_READS:-false}
      NEXT_PUBLIC_USE_DJANGO_DASHBOARD_READS: ${NEXT_PUBLIC_USE_DJANGO_DASHBOARD_READS:-false}
      NEXT_PUBLIC_USE_DJANGO_AUTH: ${NEXT_PUBLIC_USE_DJANGO_AUTH:-false}
      NEXT_PUBLIC_USE_DJANGO_ADMIN_WRITES: ${NEXT_PUBLIC_USE_DJANGO_ADMIN_WRITES:-false}
      NEXT_PUBLIC_USE_DJANGO_PRODUCAO_WRITES: ${NEXT_PUBLIC_USE_DJANGO_PRODUCAO_WRITES:-false}
      NEXT_PUBLIC_USE_DJANGO_QUALIDADE_WRITES: ${NEXT_PUBLIC_USE_DJANGO_QUALIDADE_WRITES:-false}
    depends_on:
      backend:
        condition: service_healthy

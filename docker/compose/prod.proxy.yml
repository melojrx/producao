# Nginx — proxy reverso dominio unico (MDJ-18)

services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROD_HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

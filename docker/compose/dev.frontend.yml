# Frontend Next.js dev — hot-reload (MDJ-17)
# Caminhos relativos a este arquivo (docker/compose/).

services:
  frontend:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      # Browser no host: NEXT_PUBLIC_* resolve no cliente
      NEXT_PUBLIC_DJANGO_API_URL: http://localhost:8001
      # Server Actions/SSR dentro do container: rede Docker interna
      DJANGO_API_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
    env_file:
      - path: ../../.env.local
        required: false
    volumes:
      - ../..:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      - backend

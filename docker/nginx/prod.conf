# Proxy reverso producao — dominio unico producao.costurai.com.br (MDJ-18)
# Roteamento: /api/v1/, /admin/, /health/, /static/ → backend; /media/ → volume local; resto → frontend

upstream pcp_backend {
    server backend:8000;
}

upstream pcp_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /api/v1/ {
        proxy_pass http://pcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        absolute_redirect off;
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://pcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health/ {
        proxy_pass http://pcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /app/media/;
        try_files $uri =404;
    }

    location /static/ {
        proxy_pass http://pcp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://pcp_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
